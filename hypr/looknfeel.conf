# Change the default Omarchy look'n'feel

# https://wiki.hypr.land/Configuring/Basics/Variables/#general
general {
    # No gaps between windows or borders
    gaps_in = 2
    gaps_out = 4
    border_size = 2

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#decoration
decoration {
    rounding = 12
    active_opacity = 0.95
    inactive_opacity = 0.95

    # Glassy blur
    blur {
       enabled = true
        size = 8          # Size of the blur (radius)
        passes = 5        # Number of passes (higher = better quality, higher GPU usage)
        noise = 0.0117    # Adds a grainy, frosted texture
        brightness = 0.8  # Darkens/brightens the blurred area
        vibrancy = 0.16   # Boosts color saturation slightly
        vibrancy_darkness = 0.0
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }

    # Dim unfocused windows slightly
    dim_inactive = true
    dim_strength = 0.05
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#animations
animations {
    # Disable all animations
    # enabled = no
    # enabled = true
    #
    # # Define smooth easing curves
    # bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    # bezier = easeOutQuart, 0.25, 1, 0.5, 1
    #
    # animation = windows, 1, 6, easeOutQuart, slide
    # animation = windowsOut, 1, 5, easeInOutCubic, slide
    # animation = fade, 1, 6, easeOutQuart
    # animation = workspaces, 1, 6, easeOutQuart, slidefade 20%
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# https://wiki.hypr.land/Configuring/Layouts/Scrolling-Layout/
scrolling {
        
  # Ensures single columns automatically stretch to fill the viewport
  fullscreen_on_one_column = true
}

# Larger About (fastfetch) terminal — uses org.omarchy.about app-id
# Don't tag floating-window: that tag applies the default 875×600 size
windowrule = float on, match:class org.omarchy.about
windowrule = center on, match:class org.omarchy.about
windowrule = size 1200 750, match:class org.omarchy.about
