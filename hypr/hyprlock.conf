source = ~/.config/desktop/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/desktop/current/background
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.15
}

animations {
    enabled = false
}

# ── Time ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 72
    font_family = CaskaydiaMono Nerd Font
    font_weight = 300

    position = 0, 180
    halign = center
    valign = center

    shadow_passes = 0
}

# ── Date ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date '+%A, %B %-d'
    color = $font_color
    font_size = 18
    font_family = CaskaydiaMono Nerd Font
    font_weight = 400

    position = 0, 110
    halign = center
    valign = center

    shadow_passes = 0
}

# ── Password input ────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 360, 52
    position = 0, -40
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 2

    font_family = CaskaydiaMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 12
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
